name: meal_mate
description: "MealMate - intelligent meal planning and shopping list generation app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  powersync: ^1.17.0
  drift_sqlite_async: ^0.2.6
  supabase_flutter: ^2.12.0
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  connectivity_plus: ^7.0.0
  uuid: ^4.0.0
  shared_preferences: ^2.3.0
  freezed_annotation: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.32.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.3
  flutter_lints: ^5.0.0
  freezed: ^2.5.0

flutter:
  uses-material-design: true
